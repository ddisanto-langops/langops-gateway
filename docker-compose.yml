services:
  gateway:
    build: .
    ports:
      - "3500:3500"
    env_file:
      - /etc/langops-gateway/secrets.env
  
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    env_file:
      - /etc/langops-gateway/secrets.env

volumes:
  redis-data: